# =============================================================================
# WhatsApp AI Support Engine — White-Label / Multi-Business
# docker-compose.yml
#
# Services:
#   db        PostgreSQL 16 + pgvector (system DB + RAG vectors)
#   qdrant    Optional dedicated Vector DB (switchable via VECTOR_PROVIDER)
#   n8n       Automation engine (workflows)
#   dashboard Next.js full-stack admin + API + WhatsApp webhook
#   nginx     Reverse proxy + SSL termination
#
# Quick start:
#   cp .env.example .env   &&  edit .env
#   docker compose up -d
#   # schema + demo data are auto-loaded from ./sql on first boot
# =============================================================================

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: was_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-was}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-was_password}
      POSTGRES_DB: ${POSTGRES_DB:-was_engine}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Files in /docker-entrypoint-initdb.d run in alphabetical order on FIRST boot only.
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/seed_demo.sql:/docker-entrypoint-initdb.d/02_seed_demo.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-was} -d ${POSTGRES_DB:-was_engine}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [was_net]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: was_qdrant
    restart: unless-stopped
    # Only needed when VECTOR_PROVIDER=qdrant. Harmless to leave running.
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    networks: [was_net]

  n8n:
    image: n8nio/n8n:latest
    container_name: was_n8n
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # --- n8n core ---
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-Africa/Cairo}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change_me_32_char_minimum_secret}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      # --- n8n persists its own data in Postgres (separate logical db) ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-was_engine}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-was}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-was_password}
      DB_POSTGRESDB_SCHEMA: n8n
      # --- expose engine config to Code/HTTP nodes ---
      WAS_DASHBOARD_INTERNAL_URL: http://dashboard:3000
      WAS_DB_DSN: postgres://${POSTGRES_USER:-was}:${POSTGRES_PASSWORD:-was_password}@db:5432/${POSTGRES_DB:-was_engine}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
      - ./prompts:/prompts:ro
    ports:
      - "${N8N_PORT:-5678}:5678"
    networks: [was_net]

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: was_dashboard
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-was}:${POSTGRES_PASSWORD:-was_password}@db:5432/${POSTGRES_DB:-was_engine}
      # Vector
      VECTOR_PROVIDER: ${VECTOR_PROVIDER:-pgvector}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      # AI provider (provider-agnostic adapter)
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-3-small}
      AI_EMBEDDING_DIM: ${AI_EMBEDDING_DIM:-1536}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      # Engine
      N8N_BASE_URL: http://n8n:5678
      ENGINE_INTERNAL_TOKEN: ${ENGINE_INTERNAL_TOKEN:-change_me_internal_token}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      TZ: ${TZ:-Africa/Cairo}
      PROMPTS_DIR: /app/prompts
    volumes:
      - ./prompts:/app/prompts:ro     # single source of truth for AI prompts
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    networks: [was_net]

  nginx:
    image: nginx:alpine
    container_name: was_nginx
    restart: unless-stopped
    depends_on: [dashboard, n8n]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks: [was_net]

volumes:
  db_data:
  qdrant_data:
  n8n_data:

networks:
  was_net:
    driver: bridge
