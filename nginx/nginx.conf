user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 25m;   # allow CSV / knowledge file uploads

    upstream dashboard_upstream { server dashboard:3000; }
    upstream n8n_upstream       { server n8n:5678; }

    # ---- HTTP : redirect to HTTPS (comment the redirect out if running plain HTTP) ----
    server {
        listen 80;
        server_name _;

        # For Let's Encrypt HTTP-01 challenges:
        location /.well-known/acme-challenge/ { root /var/www/certbot; }

        # Plain-HTTP mode (dev): proxy directly. For production, replace this
        # block's body with:  return 301 https://$host$request_uri;
        location / {
            proxy_pass http://dashboard_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WhatsApp webhook + n8n editor (optional separate host recommended in prod)
        location /n8n/ {
            proxy_pass http://n8n_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }

    # ---- HTTPS (enable after placing certs in ./nginx/certs) ----
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://dashboard_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /n8n/ {
            proxy_pass http://n8n_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
